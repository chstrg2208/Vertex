version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vertexhr-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: vertexhr
    ports:
      - "5750:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
